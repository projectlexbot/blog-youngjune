<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>영준의 책장 — 글쓰기</title>
  <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #f5f4f0; color: #2c2c2c; min-height: 100vh; }

    /* 로그인 화면 */
    #login-screen {
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .login-box {
      background: white; border-radius: 16px; padding: 48px 40px; width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .login-box h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .login-box p { font-size: 14px; color: #888; margin-bottom: 32px; }
    .login-box input {
      width: 100%; padding: 12px 16px; border: 1.5px solid #e0e0e0; border-radius: 10px;
      font-size: 16px; outline: none; margin-bottom: 16px;
    }
    .login-box input:focus { border-color: #4a7c59; }
    .login-box button {
      width: 100%; padding: 13px; background: #4a7c59; color: white; border: none;
      border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer;
    }
    .login-box button:hover { background: #3d6649; }
    .login-error { color: #e04040; font-size: 14px; margin-top: 10px; display: none; }

    /* 에디터 화면 */
    #editor-screen { display: none; }
    .top-bar {
      background: white; border-bottom: 1px solid #e8e4dc; padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between; height: 56px;
      position: sticky; top: 0; z-index: 100;
    }
    .top-bar h1 { font-size: 16px; font-weight: 700; }
    .top-bar-right { display: flex; gap: 12px; align-items: center; }
    .btn-save {
      padding: 8px 24px; background: #4a7c59; color: white; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-save:hover { background: #3d6649; }
    .btn-save:disabled { background: #aaa; cursor: not-allowed; }
    .btn-logout {
      padding: 8px 16px; background: none; border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 13px; color: #888; cursor: pointer;
    }

    .editor-layout { display: flex; gap: 0; min-height: calc(100vh - 56px); }

    .sidebar {
      width: 300px; background: white; border-right: 1px solid #e8e4dc;
      padding: 24px 20px; flex-shrink: 0; overflow-y: auto;
    }
    .sidebar h2 { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #444; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 9px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px;
      font-size: 14px; font-family: inherit; outline: none;
    }
    .field input:focus, .field select:focus { border-color: #4a7c59; }
    .field .hint { font-size: 12px; color: #aaa; margin-top: 4px; }
    .field-row { display: flex; align-items: center; gap: 10px; }
    .field-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .field-row label { font-size: 14px; color: #444; cursor: pointer; }

    .main-editor { flex: 1; padding: 32px; min-width: 0; }
    .main-editor .field label { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
    .title-input {
      width: 100%; font-size: 26px; font-weight: 700; border: none; outline: none;
      background: transparent; font-family: inherit; color: #1a1a1a; margin-bottom: 24px;
      border-bottom: 2px solid #e8e4dc; padding-bottom: 16px;
    }
    .title-input::placeholder { color: #ccc; }

    .EasyMDEContainer { border-radius: 10px; }
    .CodeMirror { border-radius: 0 0 10px 10px; }

    /* 본문에 사진 넣기 버튼 */
    .editor-tools { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .btn-insert-image {
      padding: 8px 16px; background: #fff; border: 1.5px solid #4a7c59; color: #4a7c59;
      border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .btn-insert-image:hover { background: #4a7c59; color: #fff; }
    .img-insert-status { font-size: 13px; }
    .img-insert-status.uploading { color: #4a7c59; }
    .img-insert-status.error { color: #c62828; }

    .save-status {
      font-size: 13px; padding: 6px 14px; border-radius: 20px;
    }
    .save-status.success { background: #e8f5e9; color: #388e3c; }
    .save-status.error { background: #fdecea; color: #c62828; }

    /* 썸네일(책 표지) */
    .thumb-preview { margin-top: 10px; display: none; }
    .thumb-preview img {
      width: 100%; max-height: 180px; object-fit: cover;
      border-radius: 8px; border: 1px solid #e8e4dc;
    }
    .thumb-status { font-size: 12px; margin-top: 6px; }
    .thumb-status.uploading { color: #4a7c59; }
    .thumb-status.error { color: #c62828; }
    .btn-thumb-clear {
      margin-top: 8px; padding: 5px 12px; background: none; border: 1.5px solid #ddd;
      border-radius: 6px; font-size: 12px; color: #888; cursor: pointer;
    }

    /* 글 목록 화면 */
    #list-screen { display: none; }
    .list-wrap { max-width: 720px; margin: 0 auto; padding: 28px 20px; }
    .list-item {
      display: block; background: white; border: 1px solid #e8e4dc; border-radius: 10px;
      padding: 16px 18px; margin-bottom: 12px; cursor: pointer; text-align: left; width: 100%;
      font-family: inherit;
    }
    .list-item:hover { border-color: #4a7c59; }
    .list-item .li-title { font-size: 16px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
    .list-item .li-meta { font-size: 13px; color: #999; }
    .list-empty { text-align: center; color: #999; padding: 40px 0; }
    .btn-ghost {
      padding: 8px 16px; background: none; border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 13px; color: #555; cursor: pointer; font-family: inherit;
    }

    /* ── 모바일 반응형 ─────────────────────────────────────── */
    @media (max-width: 768px) {
      /* 상단 바: 칸이 좁으니 패딩·글자·버튼 축소, 줄바꿈 방지 */
      .top-bar {
        padding: 0 14px; height: 52px;
      }
      .top-bar h1 {
        font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .top-bar-right { gap: 6px; flex-shrink: 0; }
      .btn-save { padding: 8px 12px; font-size: 13px; }
      .btn-logout { padding: 8px 9px; font-size: 12px; }
      .btn-ghost { padding: 8px 9px; font-size: 12px; }
      .list-wrap { padding: 16px 12px; }
      /* 저장 상태 메시지는 좁은 화면에서 숨김 (저장 후 알림으로 충분) */
      .save-status { display: none; }

      /* 사이드바와 에디터를 위아래로 쌓기 */
      .editor-layout { flex-direction: column; min-height: 0; }
      .sidebar {
        width: 100%; border-right: none; border-bottom: 1px solid #e8e4dc;
        padding: 20px 16px;
      }
      .main-editor { padding: 20px 16px; }
      .title-input { font-size: 22px; margin-bottom: 18px; padding-bottom: 12px; }

      /* 로그인 박스도 화면 폭에 맞춤 */
      .login-box { width: 100%; max-width: 360px; margin: 0 16px; padding: 40px 28px; }
    }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-box">
    <h1>영준의 책장</h1>
    <p>글쓰기 관리자 화면</p>
    <input type="password" id="pw-input" placeholder="비밀번호 입력" />
    <button onclick="login()">로그인</button>
    <div class="login-error" id="login-error">비밀번호가 틀렸습니다.</div>
  </div>
</div>

<!-- 글 목록 화면 -->
<div id="list-screen">
  <div class="top-bar">
    <h1>📚 내 글 목록</h1>
    <div class="top-bar-right">
      <button class="btn-save" onclick="newPost()">+ 새 글 쓰기</button>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </div>
  <div class="list-wrap" id="list-wrap">불러오는 중...</div>
</div>

<!-- 에디터 화면 -->
<div id="editor-screen">
  <div class="top-bar">
    <h1 id="editor-title">✍️ 새 글 쓰기</h1>
    <div class="top-bar-right">
      <span class="save-status" id="save-status"></span>
      <button class="btn-ghost" onclick="showList()">← 목록</button>
      <button class="btn-save" id="btn-save" onclick="savePost()">저장 &amp; 발행</button>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="editor-layout">
    <div class="sidebar">
      <h2>글 설정</h2>

      <div class="field">
        <label>날짜</label>
        <input type="date" id="f-date" />
      </div>

      <div class="field">
        <label>서가 (카테고리)</label>
        <select id="f-category">
          <option value="에세이">에세이</option>
          <option value="소설">소설</option>
          <option value="인문교양">인문교양</option>
        </select>
      </div>

      <div class="field">
        <label>책 제목 (첫 번째 태그)</label>
        <input type="text" id="f-book" placeholder="예: 커피공부" />
        <div class="hint">메인 책장에서 책 이름이 됩니다</div>
      </div>

      <div class="field">
        <label>책 소개 (선택)</label>
        <textarea id="f-bookintro" rows="2" placeholder="이 책(시리즈) 전체를 소개하는 글"></textarea>
        <div class="hint">책 페이지 상단에 표시됩니다. ★ 대표 표지로 지정한 글에 적어주세요. (글의 한 줄 소개와는 별개)</div>
      </div>

      <div class="field">
        <label>추가 태그 (선택)</label>
        <input type="text" id="f-tags" placeholder="예: 커피, 일상" />
        <div class="hint">쉼표로 구분</div>
      </div>

      <div class="field">
        <label>글 한 줄 소개 (선택)</label>
        <input type="text" id="f-desc" placeholder="이 글의 한 줄 소개 (검색·공유 미리보기에 표시)" />
        <div class="hint">이 글 하나에 대한 소개입니다. (책 소개와 별개)</div>
      </div>

      <div class="field">
        <label>책 표지 이미지 (선택)</label>
        <input type="file" id="f-thumb-file" accept="image/*" />
        <div class="hint">이 글의 썸네일이자 책 표지로 쓰입니다</div>
        <div class="thumb-preview" id="thumb-preview">
          <img id="thumb-img" alt="표지 미리보기" />
          <button type="button" class="btn-thumb-clear" onclick="clearThumb()">이미지 제거</button>
        </div>
        <div class="thumb-status" id="thumb-status"></div>
        <div class="field-row" id="bookcover-row" style="display:none; margin-top:12px;">
          <input type="checkbox" id="f-bookcover" />
          <label for="f-bookcover">이 이미지를 책 대표 표지로 지정</label>
        </div>
        <div class="hint" id="bookcover-hint" style="display:none;">
          같은 책(첫 번째 태그)의 메인 책장 표지로 이 이미지를 사용합니다.
        </div>
      </div>

      <div class="field">
        <div class="field-row">
          <input type="checkbox" id="f-draft" />
          <label for="f-draft">초안으로 저장 (비공개)</label>
        </div>
      </div>

      <div class="field">
        <div class="field-row">
          <input type="checkbox" id="f-schedule" />
          <label for="f-schedule">⏰ 예약 발행</label>
        </div>
        <input type="datetime-local" id="f-publish-at" style="display:none; margin-top:8px;" />
        <div class="hint" id="schedule-hint" style="display:none;">지정한 시각(한국 시간)이 되면 자동으로 공개됩니다.</div>
      </div>
    </div>

    <div class="main-editor">
      <input class="title-input" id="f-title" type="text" placeholder="제목을 입력하세요" />
      <div class="editor-tools">
        <button type="button" class="btn-insert-image" onclick="document.getElementById('body-image-file').click()">🖼 본문에 사진 넣기</button>
        <input type="file" id="body-image-file" accept="image/*" style="display:none" />
        <span class="img-insert-status" id="img-insert-status"></span>
      </div>
      <textarea id="body-editor"></textarea>
    </div>
  </div>
</div>

<script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
<script>
  let pw = '';
  let easyMDE;
  let editorReady = false;          // EasyMDE 초기화 여부
  let editingFilename = null;       // 편집 중인 기존 글의 파일명 (새 글이면 null)
  let uploadedThumbnail = null;     // 업로드된 표지 이미지의 공개 경로 (예: /image/xxx.png)

  // 오늘 날짜 기본값
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('f-date').value = today;

  // Enter 키로 로그인
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  // 예약 발행 체크 시 날짜·시간 입력칸 표시
  document.getElementById('f-schedule').addEventListener('change', e => {
    const on = e.target.checked;
    const input = document.getElementById('f-publish-at');
    document.getElementById('schedule-hint').style.display = on ? 'block' : 'none';
    input.style.display = on ? 'block' : 'none';
    // 처음 켜면 기본값으로 내일 09:00 제안
    if (on && !input.value) {
      const d = new Date(Date.now() + 86400000);
      input.value = d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0') + 'T09:00';
    }
  });

  function login() {
    const input = document.getElementById('pw-input').value;
    // 서버에 비밀번호만 검증 (action: 'check' — 저장소에 아무것도 커밋하지 않음)
    fetch('/api/cms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: input, action: 'check' }),
    }).then(r => {
      // 401이면 틀린 비번, 그 외는 성공
      if (r.status === 401) {
        document.getElementById('login-error').style.display = 'block';
      } else {
        pw = input;
        document.getElementById('login-screen').style.display = 'none';
        showList();
      }
    });
  }

  // EasyMDE는 한 번만 초기화 (목록에서 글을 열거나 새 글을 쓸 때)
  function ensureEditor() {
    if (editorReady) return;
    easyMDE = new EasyMDE({
      element: document.getElementById('body-editor'),
      placeholder: '본문을 여기에 쓰세요...\n\n## 소제목은 ## 으로\n\n> 인용문은 > 로 시작합니다.',
      spellChecker: false,
      autofocus: false,
      toolbar: ['bold', 'italic', '|', 'heading-2', 'quote', '|', 'unordered-list', 'ordered-list', '|', 'link', '|', 'preview'],
      status: false,
    });
    document.getElementById('f-thumb-file').addEventListener('change', uploadThumb);
    document.getElementById('body-image-file').addEventListener('change', insertBodyImage);
    editorReady = true;
  }

  // ── 본문 중간에 사진 삽입 ─────────────────────────────────────
  // 사진을 업로드한 뒤, 에디터 커서 위치에 마크다운 이미지(![](경로))를 넣음
  async function insertBodyImage(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;

    const status = document.getElementById('img-insert-status');
    status.textContent = '사진 업로드 중...';
    status.className = 'img-insert-status uploading';

    // 파일을 base64로 읽기
    const dataUrl = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
    const base64 = String(dataUrl).split(',')[1];
    const filename = makeImageName(file.name);

    try {
      const res = await fetch('/api/cms', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw, upload: 'image', filename, content: base64 }),
      });
      const data = await res.json();
      if (res.ok && data.path) {
        // 커서 위치(또는 글 끝)에 마크다운 이미지 삽입
        const cm = easyMDE.codemirror;
        const alt = file.name.replace(/\.[^.]+$/, '');
        cm.replaceSelection('\n![' + alt + '](' + data.path + ')\n');
        cm.focus();
        status.textContent = '✓ 사진이 본문에 삽입되었습니다';
        status.className = 'img-insert-status uploading';
      } else {
        status.textContent = '업로드 실패: ' + (data.error || '알 수 없는 오류');
        status.className = 'img-insert-status error';
      }
    } catch (err) {
      status.textContent = '네트워크 오류로 업로드에 실패했습니다.';
      status.className = 'img-insert-status error';
    }
    e.target.value = ''; // 같은 사진을 다시 선택할 수 있도록 초기화
    setTimeout(() => { status.textContent = ''; status.className = 'img-insert-status'; }, 4000);
  }

  // ── 글 목록 화면 ──────────────────────────────────────────────
  function showList() {
    document.getElementById('editor-screen').style.display = 'none';
    document.getElementById('list-screen').style.display = 'block';
    loadList();
  }

  async function loadList() {
    const wrap = document.getElementById('list-wrap');
    wrap.textContent = '불러오는 중...';
    try {
      const res = await fetch('/api/cms', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw, action: 'list' }),
      });
      const data = await res.json();
      if (!res.ok) { wrap.innerHTML = '<div class="list-empty">목록을 불러오지 못했습니다.<br>' + (data.error || '') + '</div>'; return; }
      if (!data.files || data.files.length === 0) {
        wrap.innerHTML = '<div class="list-empty">아직 작성한 글이 없습니다.<br>위 "+ 새 글 쓰기"로 첫 글을 써보세요.</div>';
        return;
      }
      wrap.innerHTML = '';
      data.files.forEach(f => {
        // 서버가 글의 실제 제목·날짜를 내려줌 (없으면 파일명에서 보조 추출)
        let title = f.title;
        let date = f.date || '';
        if (!title) {
          const m = f.name.replace(/\.md$/, '').match(/^(\d{4}-\d{2}-\d{2})-(.*)$/);
          if (m) { date = date || m[1]; title = m[2].replace(/-/g, ' '); }
          else { title = f.name.replace(/\.md$/, ''); }
        }
        const btn = document.createElement('button');
        btn.className = 'list-item';
        btn.innerHTML = '<div class="li-title"></div><div class="li-meta"></div>';
        btn.querySelector('.li-title').textContent = title;
        btn.querySelector('.li-meta').textContent = date;
        btn.onclick = () => openPost(f.name);
        wrap.appendChild(btn);
      });
    } catch (e) {
      wrap.innerHTML = '<div class="list-empty">네트워크 오류로 목록을 불러오지 못했습니다.</div>';
    }
  }

  // 새 글 쓰기
  function newPost() {
    ensureEditor();
    editingFilename = null;
    resetForm();
    document.getElementById('editor-title').textContent = '✍️ 새 글 쓰기';
    document.getElementById('list-screen').style.display = 'none';
    document.getElementById('editor-screen').style.display = 'block';
    setTimeout(() => easyMDE.codemirror.refresh(), 0);
  }

  // 기존 글 불러와 편집
  async function openPost(name) {
    ensureEditor();
    const wrap = document.getElementById('list-wrap');
    wrap.textContent = '글을 불러오는 중...';
    try {
      const res = await fetch('/api/cms', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw, action: 'get', filename: name }),
      });
      const data = await res.json();
      if (!res.ok) { alert('글을 불러오지 못했습니다: ' + (data.error || '')); loadList(); return; }
      editingFilename = name;
      fillForm(data.content);
      document.getElementById('editor-title').textContent = '✏️ 글 편집';
      document.getElementById('list-screen').style.display = 'none';
      document.getElementById('editor-screen').style.display = 'block';
      setTimeout(() => easyMDE.codemirror.refresh(), 0);
    } catch (e) {
      alert('네트워크 오류로 글을 불러오지 못했습니다.');
      loadList();
    }
  }

  function resetForm() {
    document.getElementById('f-title').value = '';
    document.getElementById('f-date').value = today;
    document.getElementById('f-category').value = '에세이';
    document.getElementById('f-book').value = '';
    document.getElementById('f-tags').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-bookintro').value = '';
    document.getElementById('f-draft').checked = false;
    document.getElementById('f-schedule').checked = false;
    document.getElementById('f-publish-at').value = '';
    document.getElementById('f-publish-at').style.display = 'none';
    document.getElementById('schedule-hint').style.display = 'none';
    easyMDE.value('');
    clearThumb();
  }

  // YAML 큰따옴표 값 해제 (저장 시 따옴표로 감쌌으므로 읽을 때 풀어줌)
  function unquote(v) {
    v = String(v).trim();
    if (v.length >= 2 && v[0] === '"' && v[v.length - 1] === '"') {
      return v.slice(1, -1).replace(/\\n/g, '\n').replace(/\\"/g, '"').replace(/\\\\/g, '\\');
    }
    return v;
  }

  // 프론트매터(---로 둘러싼 YAML)와 본문을 분리해 폼에 채움
  function parseFrontmatter(text) {
    const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
    if (!m) return { data: {}, body: text };
    const lines = m[1].split(/\r?\n/);
    const data = {};
    for (let i = 0; i < lines.length; i++) {
      const km = lines[i].match(/^([a-zA-Z]+):\s*(.*)$/);
      if (!km) continue;
      const key = km[1];
      let val = km[2];
      if (key === 'tags') {
        if (val.trim().startsWith('[')) {
          data.tags = val.trim().replace(/^\[|\]$/g, '').split(',').map(s => unquote(s)).filter(Boolean);
        } else {
          const arr = [];
          while (i + 1 < lines.length && /^\s*-\s+/.test(lines[i + 1])) {
            arr.push(unquote(lines[++i].replace(/^\s*-\s+/, '')));
          }
          data.tags = arr;
        }
      } else {
        data[key] = unquote(val);
      }
    }
    return { data, body: m[2].replace(/^\r?\n+/, '') };
  }

  function fillForm(text) {
    resetForm();
    const { data, body } = parseFrontmatter(text);
    if (data.title) document.getElementById('f-title').value = data.title;
    if (data.date) document.getElementById('f-date').value = data.date;
    if (data.category) {
      const sel = document.getElementById('f-category');
      // 없는 카테고리면 옵션을 추가
      if (![...sel.options].some(o => o.value === data.category)) {
        const opt = document.createElement('option');
        opt.value = opt.textContent = data.category;
        sel.appendChild(opt);
      }
      sel.value = data.category;
    }
    if (data.tags && data.tags.length) {
      document.getElementById('f-book').value = data.tags[0];
      document.getElementById('f-tags').value = data.tags.slice(1).join(', ');
    }
    if (data.description) document.getElementById('f-desc').value = data.description;
    if (data.bookIntro) document.getElementById('f-bookintro').value = data.bookIntro;
    document.getElementById('f-draft').checked = (data.draft === 'true');
    // 예약 발행: publishAt(예: 2026-06-20T09:00:00+09:00)이 있으면 체크 + 입력칸 채움
    if (data.publishAt) {
      document.getElementById('f-schedule').checked = true;
      document.getElementById('f-publish-at').value = String(data.publishAt).slice(0, 16); // YYYY-MM-DDTHH:MM
      document.getElementById('f-publish-at').style.display = 'block';
      document.getElementById('schedule-hint').style.display = 'block';
    }
    if (data.thumbnail) {
      uploadedThumbnail = data.thumbnail;
      document.getElementById('thumb-img').src = data.thumbnail;
      document.getElementById('thumb-preview').style.display = 'block';
      document.getElementById('bookcover-row').style.display = 'flex';
      document.getElementById('bookcover-hint').style.display = 'block';
      document.getElementById('f-bookcover').checked = (data.bookCover === 'true');
    }
    easyMDE.value(body);
  }

  function makeImageName(originalName) {
    const date = document.getElementById('f-date').value || today;
    const dot = originalName.lastIndexOf('.');
    const ext = (dot >= 0 ? originalName.slice(dot + 1) : 'png').toLowerCase();
    const baseRaw = dot >= 0 ? originalName.slice(0, dot) : originalName;
    const base = baseRaw
      .replace(/\s+/g, '-')
      .replace(/[^\wㄱ-힣가-힣-]/g, '')
      .slice(0, 30) || 'cover';
    const rand = Math.random().toString(36).slice(2, 6);
    return `${date}-${base}-${rand}.${ext}`;
  }

  async function uploadThumb(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;

    const status = document.getElementById('thumb-status');
    status.textContent = '이미지 업로드 중...';
    status.className = 'thumb-status uploading';

    // 파일을 base64로 읽기
    const dataUrl = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
    const base64 = String(dataUrl).split(',')[1];
    const filename = makeImageName(file.name);

    try {
      const res = await fetch('/api/cms', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw, upload: 'image', filename, content: base64 }),
      });
      const data = await res.json();
      if (res.ok && data.path) {
        uploadedThumbnail = data.path;
        document.getElementById('thumb-img').src = dataUrl; // 미리보기는 로컬 데이터 사용
        document.getElementById('thumb-preview').style.display = 'block';
        document.getElementById('bookcover-row').style.display = 'flex';
        document.getElementById('bookcover-hint').style.display = 'block';
        status.textContent = '✓ 이미지 업로드 완료';
        status.className = 'thumb-status uploading';
      } else {
        status.textContent = '업로드 실패: ' + (data.error || '알 수 없는 오류');
        status.className = 'thumb-status error';
      }
    } catch (err) {
      status.textContent = '네트워크 오류로 업로드에 실패했습니다.';
      status.className = 'thumb-status error';
    }
  }

  function clearThumb() {
    uploadedThumbnail = null;
    document.getElementById('f-thumb-file').value = '';
    document.getElementById('thumb-preview').style.display = 'none';
    document.getElementById('thumb-status').textContent = '';
    document.getElementById('bookcover-row').style.display = 'none';
    document.getElementById('bookcover-hint').style.display = 'none';
    document.getElementById('f-bookcover').checked = false;
  }

  function makeSlug(title) {
    return title
      .replace(/\s+/g, '-')
      .replace(/[^\wㄱ-힣가-힣-]/g, '')
      .slice(0, 40) || 'untitled';
  }

  async function savePost() {
    const title = document.getElementById('f-title').value.trim();
    const date = document.getElementById('f-date').value;
    const category = document.getElementById('f-category').value;
    const book = document.getElementById('f-book').value.trim();
    const extraTags = document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean);
    const desc = document.getElementById('f-desc').value.trim();
    const bookIntro = document.getElementById('f-bookintro').value.trim();
    const draft = document.getElementById('f-draft').checked;
    const body = easyMDE.value();

    if (!title) { alert('제목을 입력해주세요.'); return; }
    if (!book) { alert('책 제목(첫 번째 태그)을 입력해주세요.'); return; }

    // 예약 발행: 체크 + 시각이 있으면 한국시간(+09:00) 기준 ISO로 저장하고,
    // 표시 날짜(date)도 예약일로 맞춤
    const schedule = document.getElementById('f-schedule').checked;
    const publishAtLocal = document.getElementById('f-publish-at').value; // "YYYY-MM-DDTHH:MM"
    let publishAtIso = '';
    let dateForFm = date;
    if (schedule && publishAtLocal) {
      publishAtIso = publishAtLocal + ':00+09:00';
      dateForFm = publishAtLocal.slice(0, 10);
    }

    const tags = [book, ...extraTags];
    // YAML 안전 처리: 값을 큰따옴표로 감싸고 내부 특수문자를 이스케이프.
    // (제목에 [ : # 같은 문자가 있어도 빌드가 깨지지 않도록)
    const yamlStr = s => '"' + String(s).replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\r?\n/g, '\\n') + '"';
    const tagsYaml = '[' + tags.map(yamlStr).join(', ') + ']';

    const bookCover = document.getElementById('f-bookcover').checked;

    let frontmatter = `---\ntitle: ${yamlStr(title)}\ndate: ${dateForFm}\ncategory: ${yamlStr(category)}\ntags: ${tagsYaml}\n`;
    if (uploadedThumbnail) frontmatter += `thumbnail: ${yamlStr(uploadedThumbnail)}\n`;
    if (uploadedThumbnail && bookCover) frontmatter += `bookCover: true\n`;
    if (desc) frontmatter += `description: ${yamlStr(desc)}\n`;
    if (bookIntro) frontmatter += `bookIntro: ${yamlStr(bookIntro)}\n`;
    if (publishAtIso) frontmatter += `publishAt: ${yamlStr(publishAtIso)}\n`;
    if (draft) frontmatter += `draft: true\n`;
    frontmatter += `---\n\n`;

    const content = frontmatter + body;
    // 편집 중이면 기존 파일명을 그대로 유지(중복 글 생성 방지), 새 글이면 날짜+제목으로 생성
    const filename = editingFilename || `${dateForFm}-${makeSlug(title)}.md`;

    const btn = document.getElementById('btn-save');
    const status = document.getElementById('save-status');
    btn.disabled = true;
    btn.textContent = '저장 중...';

    try {
      const res = await fetch('/api/cms', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw, filename, content }),
      });
      const data = await res.json();
      if (res.ok) {
        editingFilename = filename; // 이후 재저장 시 같은 파일 유지
        const msg = publishAtIso
          ? '✓ 저장 완료!\n예약 시각(' + publishAtLocal.replace('T', ' ') + ')이 되면 자동으로 공개됩니다.'
          : '✓ 저장 완료!\n1~2분 후 블로그에 반영됩니다.';
        status.textContent = msg.replace(/\n/g, ' ');
        status.className = 'save-status success';
        document.getElementById('editor-title').textContent = '✏️ 글 편집';
        // 모바일에서는 상단 상태 메시지가 숨겨지므로 알림으로 확실히 안내
        alert(msg);
      } else {
        status.textContent = '오류: ' + data.error;
        status.className = 'save-status error';
        alert('저장 실패: ' + (data.error || '알 수 없는 오류'));
      }
    } catch (e) {
      status.textContent = '네트워크 오류가 발생했습니다.';
      status.className = 'save-status error';
      alert('네트워크 오류로 저장에 실패했습니다.');
    }

    btn.disabled = false;
    btn.textContent = '저장 & 발행';
    setTimeout(() => { status.textContent = ''; status.className = 'save-status'; }, 5000);
  }

  function logout() {
    pw = '';
    editingFilename = null;
    clearThumb();
    document.getElementById('editor-screen').style.display = 'none';
    document.getElementById('list-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pw-input').value = '';
  }
</script>
