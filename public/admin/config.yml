backend:
  name: github
  repo: YoungjuneNLEX/blog-youngjune
  branch: main
  base_url: https://visionary-axolotl-75c5e4.netlify.app
  auth_endpoint: /.netlify/functions/auth

media_folder: public/image
public_folder: /image

collections:
  - name: posts
    label: 글
    label_singular: 글 한 편
    folder: src/content/posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - label: 제목
        name: title
        widget: string
        hint: 글의 제목입니다.

      - label: 날짜
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        default: ""

      - label: 카테고리 (서가)
        name: category
        widget: select
        options:
          - { label: 에세이, value: 에세이 }
          - { label: 소설, value: 소설 }
          - { label: 인문교양, value: 인문교양 }
        hint: 헤더 메뉴에 표시되는 대분류입니다.

      - label: 태그 (책 제목)
        name: tags
        widget: list
        min: 1
        hint: "★ 첫 번째 태그가 메인 책장에서 책 제목이 됩니다."

      - label: 썸네일 (책 표지)
        name: thumbnail
        widget: image
        required: false
        hint: "이 이미지가 메인 책장에서 책 표지로 사용됩니다."

      - label: 책 대표 표지로 지정
        name: bookCover
        widget: boolean
        default: false
        required: false
        hint: "켜면 같은 책(첫 번째 태그)의 메인 책장 표지로 이 글의 썸네일을 사용합니다."

      - label: 한 줄 설명
        name: description
        widget: string
        required: false
        hint: 검색 결과와 SNS 공유 미리보기에 표시됩니다.

      - label: 본문
        name: body
        widget: markdown

      - label: 초안으로 저장
        name: draft
        widget: boolean
        default: false
        hint: "켜면 초안 (사이트에 보이지 않음), 끄면 발행 상태입니다."
